<script>
(function () {
  let inputLocked = false;
  let blocker = null;
  let syncTimer = null;

  function getMessagingIframe() {
    return document.getElementById("embeddedMessagingFrame")
      || document.querySelector('iframe[name*="Messaging"]')
      || document.querySelector('iframe[id*="embeddedMessaging"]');
  }

  function ensureBlocker() {
    if (blocker) return blocker;
    blocker = document.createElement("div");
    blocker.id = "em-input-blocker";
    blocker.style.position = "fixed";
    blocker.style.zIndex = "2147483647";
    blocker.style.pointerEvents = "auto";
    blocker.style.background = "rgba(240,240,240,0.65)";
    blocker.style.borderTop = "1px solid rgba(0,0,0,0.08)";
    blocker.style.display = "none";
    document.body.appendChild(blocker);
    return blocker;
  }

  function syncBlockerPosition() {
    const iframe = getMessagingIframe();
    if (!iframe || !blocker) return;

    const r = iframe.getBoundingClientRect();
    const footerHeight = 74; // adjust 64-84 if needed
    blocker.style.left = `${Math.round(r.left)}px`;
    blocker.style.top = `${Math.round(r.bottom - footerHeight)}px`;
    blocker.style.width = `${Math.round(r.width)}px`;
    blocker.style.height = `${footerHeight}px`;
  }

  function startSync() {
    if (syncTimer) return;
    syncTimer = setInterval(syncBlockerPosition, 150);
  }

  function stopSync() {
    if (!syncTimer) return;
    clearInterval(syncTimer);
    syncTimer = null;
  }

  function lockInput() {
    ensureBlocker();
    inputLocked = true;
    blocker.style.display = "block";
    syncBlockerPosition();
    startSync();
    console.log("Input locked (footer overlay active)");
  }

  function unlockInput() {
    inputLocked = false;
    if (blocker) blocker.style.display = "none";
    stopSync();
    console.log("Input unlocked");
  }

  window.addEventListener("resize", () => { if (inputLocked) syncBlockerPosition(); });
  window.addEventListener("scroll", () => { if (inputLocked) syncBlockerPosition(); }, true);

  window.addEventListener("message", function (event) {
    if (!(event.data && event.data.event === "dispatchEventToHost" && event.data.data)) return;

    const eventData = event.data.data.eventData;
    const raw = eventData && eventData.conversationEntry && eventData.conversationEntry.entryPayload;
    if (!raw) return;

    try {
      const payload = (typeof raw === "string") ? JSON.parse(raw) : raw;
      const am = payload && payload.abstractMessage;
      if (!am) return;

      if (am.choices) lockInput();
      if (am.choicesResponse) unlockInput();
    } catch (e) {
      // ignore non-JSON payload variants
    }
  });
})();
</script>
