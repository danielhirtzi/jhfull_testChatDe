<script>
console.log("Host script loaded - listening for messages");

window.addEventListener("message", (event) => {
    // Log everything for debugging
    if (event.data && event.data.event === "dispatchEventToHost") {
        console.log("dispatchEventToHost received:", event.data);
        console.log("Full data object:", JSON.stringify(event.data.data, null, 2));
        
        // Try to find choices in the data
        let dataStr = JSON.stringify(event.data.data);
        if (dataStr.includes('"choices"')) {
            console.log("Found choices in message!");
            postIframeDisable();
        } else if (dataStr.includes('"choicesResponse"') || dataStr.includes('"choiceResponse"')) {
            console.log("Found choicesResponse in message!");
            postIframeEnable();
        }
    }
});

function postIframeEnable() {
    var iframe = document.getElementById("embeddedMessagingFrame") || 
                 document.querySelector('iframe[name*="Messaging"]') ||
                 document.querySelector('iframe[id*="embeddedMessaging"]');
    
    if (iframe) {
        console.log("Found iframe, sending InputEnable");
        iframe.contentWindow.postMessage('InputEnable', '*');
    } else {
        console.error("Iframe not found!");
    }
}

function postIframeDisable() {
    var iframe = document.getElementById("embeddedMessagingFrame") || 
                 document.querySelector('iframe[name*="Messaging"]') ||
                 document.querySelector('iframe[id*="embeddedMessaging"]');
    
    if (iframe) {
        console.log("Found iframe, sending InputDisable");
        iframe.contentWindow.postMessage('InputDisable', '*');
    } else {
        console.error("Iframe not found!");
    }
}
</script>
