<script type='text/javascript'>
    function initEmbeddedMessaging() {
        try {
            embeddedservice_bootstrap.settings.language = 'de';
            embeddedservice_bootstrap.init(
                '00DUD0000091hKI',
                'Messaging_Chat_DE',
                'https://jameshardieeurope--jhfull.sandbox.my.site.com/ESWMessagingChatDE1777983133617',
                {
                    scrt2URL: 'https://jameshardieeurope--jhfull.sandbox.my.salesforce-scrt.com'

<script type='text/javascript' src='https://jameshardieeurope--jhfull.sandbox.my.site.com/ESWMessagingChatDE1777983133617/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

<script>
console.log("Host script loaded");

window.addEventListener("message", function(event) {
    // Match the actual event structure seen in console logs
    if (event.data && event.data.event === "dispatchEventToHost" && event.data.data) {
        var dataStr = JSON.stringify(event.data);
        console.log("dispatchEventToHost received, eventName:", event.data.data.eventName);

        if (dataStr.includes('"choices"') && !dataStr.includes('"choicesResponse"') && !dataStr.includes('"choiceResponse"')) {
            console.log("CHOICES DETECTED - Disabling input");
            postIframeDisable();
        } else if (dataStr.includes('"choicesResponse"') || dataStr.includes('"choiceResponse"')) {
            console.log("CHOICE RESPONSE DETECTED - Enabling input");
            postIframeEnable();
        }
    }
});

function postIframeEnable() {
    var iframe = document.getElementById("embeddedMessagingFrame") ||
                 document.querySelector('iframe[name*="Messaging"]') ||
                 document.querySelector('iframe[id*="embeddedMessaging"]');
    if (iframe) {
        console.log("Sending InputEnable");
        iframe.contentWindow.postMessage('InputEnable', '*');
    } else {
        console.error("Iframe not found!");
    }
}

function postIframeDisable() {
    var iframe = document.getElementById("embeddedMessagingFrame") ||
                 document.querySelector('iframe[name*="Messaging"]') ||
                 document.querySelector('iframe[id*="embeddedMessaging"]');
    if (iframe) {
        console.log("Sending InputDisable");
        iframe.contentWindow.postMessage('InputDisable', '*');
    } else {
        console.error("Iframe not found!");
    }
}
</script>
