<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JamesHardie Test Chat DE</title>
</head>
<body>
  <h1>JamesHardie FULL Chat DE</h1>

  <script type="text/javascript">
    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = "de";
        embeddedservice_bootstrap.init(
          "00DUD0000091hKI",
          "Messaging_Chat_DE",
          "https://jameshardieeurope--jhfull.sandbox.my.site.com/ESWMessagingChatDE1777983133617",
          {
            scrt2URL: "https://jameshardieeurope--jhfull.sandbox.my.salesforce-scrt.com"
          }
        );
      } catch (err) {
        console.error("Error loading Embedded Messaging:", err);
      }
    }
  </script>

  <script
    type="text/javascript"
    src="https://jameshardieeurope--jhfull.sandbox.my.site.com/ESWMessagingChatDE1777983133617/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()">
  </script>

  <script>
    (function () {
      console.log("Host script loaded");

      function getIframe() {
        return document.getElementById("embeddedMessagingFrame")
          || document.querySelector('iframe[name*="Messaging"]')
          || document.querySelector('iframe[id*="embeddedMessaging"]');
      }

      function postToIframe(message) {
        var iframe = getIframe();
        if (!iframe || !iframe.contentWindow) {
          console.warn("Messaging iframe not found");
          return;
        }
        iframe.contentWindow.postMessage(message, "*");
      }

      function handleEntryPayload(rawPayload) {
        try {
          var payload = (typeof rawPayload === "string")
            ? JSON.parse(rawPayload)
            : rawPayload;

          if (!payload || !payload.abstractMessage) return;

          if (payload.abstractMessage.choices) {
            console.log("CHOICES DETECTED -> InputDisable");
            postToIframe("InputDisable");
            return;
          }

          if (payload.abstractMessage.choicesResponse) {
            console.log("CHOICES RESPONSE DETECTED -> InputEnable");
            postToIframe("InputEnable");
            return;
          }
        } catch (e) {
          console.warn("Skipping non-JSON payload:", e);
        }
      }

      window.addEventListener("message", function (event) {
        var data = event.data;
        if (!data || data.event !== "dispatchEventToHost" || !data.data) return;

        var eventData = data.data.eventData;
        var entryPayload =
          eventData &&
          eventData.conversationEntry &&
          eventData.conversationEntry.entryPayload;

        if (!entryPayload) return;
        handleEntryPayload(entryPayload);
      });
    })();
  </script>
</body>
</html>
